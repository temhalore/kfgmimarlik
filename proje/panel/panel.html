<!-- Yönetim Paneli Ana Ekran -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yönetim Paneli</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Panel</a>
      <button class="btn btn-outline-light ms-auto" id="logoutBtn">Çıkış</button>
    </div>
  </nav>
  <div class="container py-4">
    <h2>İçerik ve Component Yönetimi</h2>
    <div class="row">
      <div class="col-md-4">
        <div class="list-group" id="panelMenu">
          <button class="list-group-item list-group-item-action" onclick="showSection('icerik')">İçerik Yönetimi</button>
          <button class="list-group-item list-group-item-action" onclick="showSection('component')">Component Yönetimi</button>
          <button class="list-group-item list-group-item-action" onclick="showSection('gorsel')">Görsel Yönetimi</button>
        </div>
      </div>
      <div class="col-md-8">
        <div id="icerik" class="panel-section">İçerik yönetimi arayüzü buraya gelecek.</div>
        <div id="component" class="panel-section d-none">Component yönetimi arayüzü buraya gelecek.</div>
        <div id="gorsel" class="panel-section d-none">Görsel yönetimi arayüzü buraya gelecek.</div>
      </div>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
