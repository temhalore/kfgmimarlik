<!-- Yönetim Paneli Giriş Ekranı -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yönetim Paneli Giriş</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <form id="loginForm" class="p-4 bg-white rounded shadow" style="min-width:320px;max-width:400px;">
      <h2 class="mb-4 text-center">Yönetim Paneli</h2>
      <div class="mb-3">
        <label for="username" class="form-label">Kullanıcı Adı</label>
        <input type="text" class="form-control" id="username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Şifre</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
      <div id="loginError" class="text-danger mt-3 d-none">Hatalı kullanıcı adı veya şifre!</div>
    </form>
  </div>
  <script src="login.js"></script>
</body>
</html>
